name: Notion Backlog Sync

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types: [opened, reopened, synchronize, closed]
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Commit en rama → Estado: En progreso
  # ─────────────────────────────────────────────
  sync-on-commit:
    name: Commit detectado → En progreso
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Extraer IDs del mensaje de commit
        id: extract
        run: |
          # Busca todos los patrones [TASK-N] en el mensaje del commit
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"

          # Extrae los IDs completos (ej: [TASK-5] → TASK-5)
          IDS=$(echo "$COMMIT_MSG" | grep -oP '\[TASK-\d+\]' | tr -d '[]' | tr '\n' ',' | sed 's/,$//')
          echo "IDs encontrados: $IDS"
          echo "task_ids=$IDS" >> $GITHUB_OUTPUT

      - name: Actualizar estado en Notion → En progreso
        if: steps.extract.outputs.task_ids != ''
        run: |
          DATABASE_ID="347bba2c-0705-8094-8bcb-000b9b2adcae"
          NOTION_TOKEN="${{ secrets.NOTION_TOKEN }}"

          IFS=',' read -ra IDS <<< "${{ steps.extract.outputs.task_ids }}"

          for TASK_ID in "${IDS[@]}"; do
            echo "Procesando tarea ID: $TASK_ID"

            # 1. Buscar la página en Notion por el ID (ej: TASK-5)
            RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/databases/${DATABASE_ID}/query" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{
                \"filter\": {
                  \"property\": \"ID\",
                  \"rich_text\": {
                    \"equals\": \"$TASK_ID\"
                  }
                }
              }")

            PAGE_ID=$(echo "$RESPONSE" | jq -r '.results[0].id // empty')

            if [ -z "$PAGE_ID" ]; then
              echo "⚠️  No se encontró ninguna tarea con ID=$TASK_ID"
              continue
            fi

            echo "✅ Tarea encontrada: $PAGE_ID"

            # 2. Actualizar el estado
            curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d '{
                "properties": {
                  "Estado": {
                    "select": { "name": "En progreso" }
                  }
                }
              }'

            echo "🚀 Tarea $TASK_ID → En progreso"
          done

  # ─────────────────────────────────────────────
  # JOB 2: PR abierta → Estado: En revision
  # ─────────────────────────────────────────────
  sync-on-pr-open:
    name: PR abierta → En revision
    if: >
      github.event_name == 'pull_request' &&
      (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize')
    runs-on: ubuntu-latest
    steps:
      - name: Extraer IDs del título o cuerpo de la PR
        id: extract
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          FULL_TEXT="$PR_TITLE $PR_BODY"
          echo "Texto PR: $FULL_TEXT"

          IDS=$(echo "$FULL_TEXT" | grep -oP '\[TASK-\d+\]' | tr -d '[]' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "IDs encontrados: $IDS"
          echo "task_ids=$IDS" >> $GITHUB_OUTPUT

      - name: Actualizar estado en Notion → En revision
        if: steps.extract.outputs.task_ids != ''
        run: |
          DATABASE_ID="347bba2c-0705-8094-8bcb-000b9b2adcae"
          NOTION_TOKEN="${{ secrets.NOTION_TOKEN }}"

          IFS=',' read -ra IDS <<< "${{ steps.extract.outputs.task_ids }}"

          for TASK_ID in "${IDS[@]}"; do
            echo "Procesando tarea ID: $TASK_ID"

            RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/databases/${DATABASE_ID}/query" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{
                \"filter\": {
                  \"property\": \"ID\",
                  \"rich_text\": {
                    \"equals\": \"$TASK_ID\"
                  }
                }
              }")

            PAGE_ID=$(echo "$RESPONSE" | jq -r '.results[0].id // empty')

            if [ -z "$PAGE_ID" ]; then
              echo "⚠️  No se encontró ninguna tarea con ID=$TASK_ID"
              continue
            fi

            curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d '{
                "properties": {
                  "Estado": {
                    "select": { "name": "En revision" }
                  }
                }
              }'

            echo "🔍 Tarea $TASK_ID → En revision"
          done

  # ─────────────────────────────────────────────
  # JOB 3: PR mergeada a main → Estado: Done
  # ─────────────────────────────────────────────
  sync-on-pr-merged:
    name: PR mergeada → Done
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Extraer IDs del título o cuerpo de la PR
        id: extract
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          FULL_TEXT="$PR_TITLE $PR_BODY"
          echo "Texto PR: $FULL_TEXT"

          IDS=$(echo "$FULL_TEXT" | grep -oP '\[TASK-\d+\]' | tr -d '[]' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "IDs encontrados: $IDS"
          echo "task_ids=$IDS" >> $GITHUB_OUTPUT

      - name: Actualizar estado en Notion → Done
        if: steps.extract.outputs.task_ids != ''
        run: |
          DATABASE_ID="347bba2c-0705-8094-8bcb-000b9b2adcae"
          NOTION_TOKEN="${{ secrets.NOTION_TOKEN }}"

          IFS=',' read -ra IDS <<< "${{ steps.extract.outputs.task_ids }}"

          for TASK_ID in "${IDS[@]}"; do
            echo "Procesando tarea ID: $TASK_ID"

            RESPONSE=$(curl -s -X POST "https://api.notion.com/v1/databases/${DATABASE_ID}/query" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "{
                \"filter\": {
                  \"property\": \"ID\",
                  \"rich_text\": {
                    \"equals\": \"$TASK_ID\"
                  }
                }
              }")

            PAGE_ID=$(echo "$RESPONSE" | jq -r '.results[0].id // empty')

            if [ -z "$PAGE_ID" ]; then
              echo "⚠️  No se encontró ninguna tarea con ID=$TASK_ID"
              continue
            fi

            curl -s -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d '{
                "properties": {
                  "Estado": {
                    "select": { "name": "Done" }
                  }
                }
              }'

            echo "✅ Tarea $TASK_ID → Done"
          done
